<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moon Ledger v8</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>🌙 Moon Ledger v8</h1>
<p>Prototype v0.8 - Data Integrity Build</p>

<div class="card">
<h2>Add Transaction</h2>
<select id="txType">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<input id="txCategory" placeholder="Kategori">
<input id="txAmount" type="number" placeholder="Nominal">
<select id="txAccount"></select>
<button id="saveTxBtn">Simpan</button>
</div>

<div class="card">
<button id="seedBtn">🌱 Add Demo Data</button>
</div>

<div class="card">
<h2>Accounts</h2>
<div id="accountsList"></div>
</div>

<div class="card">
<h2>Transactions</h2>
<div id="transactionsList"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
