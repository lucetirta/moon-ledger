<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moon Ledger v10</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<aside class="sidebar">
<h1>🌙 Moon Ledger</h1>
<p>Prototype v1.0 Candidate</p>

<button data-page="dashboard">🏠 Dashboard</button>
<button data-page="transactions">💰 Transactions</button>
<button data-page="debts">💳 Debts</button>
<button data-page="receivables">🧾 Receivables</button>
<button data-page="settings">⚙️ Settings</button>
</aside>

<main>
<section id="dashboard" class="page">
<h2>Dashboard</h2>
<div id="cards" class="grid"></div>
</section>

<section id="transactions" class="page hidden">
<h2>Transactions</h2>

<div class="card">
<h3>Filters</h3>
<input id="searchInput" placeholder="Cari kategori atau catatan">
</div>

<div id="transactionsList"></div>
</section>

<section id="debts" class="page hidden">
<h2>Debt Payment</h2>

<div class="card">
<select id="debtAccount"></select>
<select id="debtSelect"></select>
<input id="debtAmount" type="number" placeholder="Nominal pembayaran">
<button id="payDebtBtn">Bayar Hutang</button>
</div>

<div id="debtList"></div>
</section>

<section id="receivables" class="page hidden">
<h2>Receive Payment</h2>

<div class="card">
<select id="recvAccount"></select>
<select id="recvSelect"></select>
<input id="recvAmount" type="number" placeholder="Nominal diterima">
<button id="receiveBtn">Terima Pembayaran</button>
</div>

<div id="receivableList"></div>
</section>

<section id="settings" class="page hidden">
<h2>Settings</h2>
<button id="seedBtn">🌱 Add Demo Finance Data</button>
<button id="exportBtn">💾 Export Backup</button>
</section>
</main>

<script src="js/app.js"></script>
</body>
</html>
